# Compose v2+ (no top-level `version` key required)
#
# Run as host UID/GID so files under the bind-mounted project (e.g. output/) are
# owned by your user, not root. Override if needed: DOCKER_UID=$(id -u) DOCKER_GID=$(id -g)
# docker compose run --rm isp   or set DOCKER_UID/DOCKER_GID in a .env file.
#
# GPU / CPU arch: same NVIDIA + nvidia-container-toolkit flow on x86_64 (amd64) and
# aarch64 (ARM64, e.g. DGX Spark). Docker pulls the matching image arch. LD_PRELOAD for
# the OpenMP workaround is set inside the container only when uname -m is aarch64
# (scripts/container-entrypoint.sh). Override with env LD_PRELOAD if needed.

x-geneformer-base: &geneformer-base
  image: mouse-geneformer:latest
  user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
  volumes:
    - .:/app
    - /var/run/docker.sock:/var/run/docker.sock
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  # Optional: set LD_PRELOAD in .env to override the entrypoint’s aarch64 default.
  environment:
    - LD_PRELOAD=${LD_PRELOAD:-}
  ipc: host
  working_dir: /app

services:
  mouse-geneformer:
    <<: *geneformer-base
    build: .
    container_name: mouse_geneformer_container
    ports:
      - "8888:8888"
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --NotebookApp.password=''

  # Streamlit Web UI (same image, jobs = subprocess to run_isp / tokenize / finetune / isp_umap):
  #   docker compose up -d webui
  #   http://localhost:8501
  webui:
    <<: *geneformer-base
    container_name: mouse_geneformer_webui
    ports:
      - "8501:8501"
    environment:
      - WANDB_DISABLED=true
      # Megabytes; overrides default 200 MB cap on st.file_uploader (see .streamlit/config.toml).
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=1024000
    command:
      - streamlit
      - run
      - /app/streamlit_app/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.maxUploadSize
      - "1024000"
      - --browser.gatherUsageStats=false

  # One-shot ISP run: docker compose run --rm isp
  # (uses the same image as mouse-geneformer; build that image first: docker compose build mouse-geneformer)
  isp:
    <<: *geneformer-base
    container_name: mouse_geneformer_isp
    command:
      - accelerate
      - launch
      - --num_processes
      - "${ISP_NUM_GPUS:-1}"
      - /app/run_isp.py
      - --config
      - /app/config/isp.yaml

  # Tokenization pipeline: docker compose run --rm tokenize
  tokenize:
    <<: *geneformer-base
    container_name: mouse_geneformer_tokenize
    environment:
      - TOKENIZE_CONFIG=/app/config/tokenize.yaml
    command:
      - python3
      - /app/execute_tokenizer_pipeline.py

  # Fine-tuning: docker compose run --rm finetune
  finetune:
    <<: *geneformer-base
    container_name: mouse_geneformer_finetune
    environment:
      - LD_PRELOAD=${LD_PRELOAD:-}
      - FINETUNE_CONFIG=/app/config/finetune.yaml
      - WANDB_DISABLED=true
    command:
      - python3
      - /app/run_finetune.py
      - --config
      - /app/config/finetune.yaml

  # ISP UMAP Plot Generation: docker compose run --rm isp_umap
  isp_umap:
    <<: *geneformer-base
    container_name: mouse_geneformer_isp_umap
    environment:
      - ISP_UMAP_CONFIG=/app/config/isp_umap.yaml
    command:
      - python3
      - /app/run_isp_umap.py
      - --config
      - /app/config/isp_umap.yaml
