version: '3.8'

services:
  geneformer:
    build: .
    image: mouse-geneformer:latest
    container_name: mouse_geneformer_container
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock #for nemoclaw automation
    # If using GPU, uncomment the deploy section below:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8888:8888"
    environment:
      - LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libgomp.so.1:/usr/local/lib/python3.12/dist-packages/scikit_learn.libs/libgomp-d22c30c5.so.1.0.0
    ipc: host
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    # Uncomment if you want the container to stay alive in the background
    # tty: true
    # stdin_open: true
