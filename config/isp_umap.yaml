# =============================================================================
# ISP UMAP Generator Configuration
# Path: /app/config/isp_umap.yaml
# =============================================================================

paths:
  # Path to tokenized HuggingFace dataset
  dataset: /app/data/AsanoPIPand3and5w/tokenized_dataset/AsanoPIPand3and5w_0.dataset
  # Path to the fine-tuned Geneformer model
  geneformer_model: /app/output/20260422/finetune_004752_215426Z/all_run1

umap:
  # Random seed for robust/reproducible UMAP plotting
  seed: 42
  # UMAP parameters
  n_neighbors: 15
  min_dist: 0.1
  # How many trajectories (grey arrows) to draw from Start -> Perturbed Start
  num_trajectory_arrows: 100
  # Maximum cells to extract per state to prevent memory limits
  max_cells_per_state: 2000

perturbation:
  # Gene to perturb. Accepts Ensembl ID (e.g. ENSMUSG00000039323) or Gene Symbol (e.g. Igfbp2)
  gene_to_perturb: Ece1
  # Perturbation type: delete | overexpress | inhibit | activate
  #   delete: remove gene from rank value encoding (only type implemented in ISP UMAP today)
  #   overexpress: move gene to front of rank value encoding
  #   inhibit: move gene to lower quartile of rank value encoding
  #   activate: move gene to higher quartile of rank value encoding
  type: overexpress 
  
  # Dataset column specifying the cell condition
  state_key: disease
  # The starting cell condition (the one being perturbed)
  start_state: WT
  # The goal/target condition (the one to compare against)
  end_state: AD

runtime:
  # Number of labels output by the finetuned Sequence Classification model
  num_classes: 2
  # Batch size for dataset mapping processes
  batch_size: 100
