# =============================================================================
# In-silico perturbation — run_isp.py
# Default path in Docker: /app/config/isp.yaml  (override: --config or ISP_CONFIG)
# =============================================================================

paths:
  # Tokenized HuggingFace dataset directory (.dataset)
  dataset: /app/data/Asano3w/tokenized_dataset/Asano3w_0.dataset
  # Original: /app/data/Mouse-Genecorpus-20M/MLM-re_All_mouse_tokenize_dataset.dataset
  geneformer_model: /app/output/20260421/finetune_120908_000908Z/all_run1
  #/app/models/mouse-Geneformer/
  # Per run: {output_root}/{YYYYMMDD}/[run_<UTC time>/]isp_results and .../ispstats_results
  output_root: /app/output
  output_time_subdir: true
  # output_subdir: my_label  # optional fixed name under DATE (overrides time folder)

perturbation:
  type: delete # delete | overexpress | inhibit | activate
    # "delete": delete gene from rank value encoding
    # "overexpress": move gene to front of rank value encoding
    # "inhibit": move gene to lower quartile of rank value encoding
    # "activate": move gene to higher quartile of rank value encoding
  organ_data: AD # output filename prefix
  # Dataset column for cell state labels (start / goal / alt values below refer to this column).
  state_key: disease
  start_state: AD
  end_state: WT
  alt_states: [] # Empty list = perturb each gene per cell ("all"). Otherwise list of Ensembl IDs.
  genes_to_perturb: [Igfbp2]

model:
  type: CellClassifier #Pretrained # Pretrained | GeneClassifier | CellClassifier
  num_classes: 2

isp:
  max_ncells: 2000
  emb_layer: 0 # 0 = last layer; -1 = second-to-last (see Geneformer docs)
  emb_mode: cell # cell | cell_and_gene
  cell_emb_style: mean_pool
  combos: 0
  anchor_gene: null
  perturb_rank_shift: null
  perturb_rank_direct_shift: null
  filter_data: null # if you want to ristrict cell tyep to perturb, specify like { "cell_type": ["cardiomyocyte"] }

stats:
  mode: goal_state_shift # goal_state_shift | vs_null | mixture_model | aggregate_data

# Post-stats plots + CSV tables (isp_analysis.py). Figures: {output_root}/{date}/figures/
analysis:
  enabled: true

# Provenance and reproducibility settings
provenance:
  # Whether to compute content fingerprints of input data
  enable_input_fingerprint: true
  # If true, use fast metadata-based fingerprinting for large datasets
  fingerprint_fast: true

runtime:
  # GPU minibatch for transformer forwards; raise until below OOM.
  forward_batch_size: 100
  # HuggingFace datasets map/filter CPU workers.
  nproc: 16
