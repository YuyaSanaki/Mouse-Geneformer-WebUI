# =============================================================================
# Tokenization Pipeline Configuration — config/tokenize.yaml
# =============================================================================

data:
  # "single-cell" (barcodes/features/matrix) or "loom"
  input_type: "single-cell"

  # Directory containing sample subfolders (for single-cell) or .loom files
  input_dir: "/app/data/Asano3and5w/"

  # Intermediate directory for .loom files if starting from single-cell
  loom_temp_dir: "/app/data/Asano3and5w/loom_files/"
  
  # Final tokenized dataset output
  output_dir: "/app/data/Asano3and5w/tokenized_dataset/"
  output_prefix: "Asano3and5w"

tokenizer:
  nproc: 16
  max_cells: 300000
  # Map metadata from loom column attributes to dataset columns
  custom_attr_name_dict:
    time: "time"
    genotype: "genotype"
    replicate: "replicate"
    disease: "disease"
    sample_id: "sample_id"

    # need to accept more flexibility using metadata, not folder name

# Settings for single-cell (barcodes/features/matrix) format
single_cell_settings:
  # If true, try to extract metadata (time-genotype-replicate) from folder names
  extract_metadata_from_path: true

# Provenance and reproducibility settings
provenance:
  # Whether to compute content fingerprints of input data
  enable_input_fingerprint: true
  # If true, use fast metadata-based fingerprinting for large datasets
  fingerprint_fast: true
