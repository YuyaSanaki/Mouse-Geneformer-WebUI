paths:
  dataset: /app/data/AD/tokenized_dataset/AD_data_0.dataset
  geneformer_model: /app/models/mouse-Geneformer/
  output_root: /app/output
  output_time_subdir: true
  output_subdir: 3w_WT_AD

perturbation:
  type: delete
  organ_data: 3w_WT_AD
  state_key: disease
  start_state: WT
  end_state: AD
  alt_states: []
  genes_to_perturb: []

model:
  type: Pretrained
  num_classes: 2

isp:
  max_ncells: 2000
  emb_layer: 0
  emb_mode: cell
  cell_emb_style: mean_pool
  combos: 0
  anchor_gene: null
  perturb_rank_shift: null
  perturb_rank_direct_shift: null
  filter_data: { "time": ["3w"] }

stats:
  mode: goal_state_shift

analysis:
  enabled: true

provenance:
  enable_input_fingerprint: true
  fingerprint_fast: true

runtime:
  forward_batch_size: 160
  nproc: 16
